name: QA Automation

on:
  push:
    branches: [ dev, main ]

jobs:
  qa:
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Run QA Tests and AI Analysis
        run: npm run qa:full
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8080/api/v1
          DISCORD_WEBHOOK_URL: https://discord.com/api/webhooks/1499340339452838013/Z8AfLvHjXiReLpv9Ab_2-h--FWYUzyfalJXVyZtdkbH-MnUjZ-v0JsvXycAVxKGmmdDP
